  <circle cx="100" cy="55" r="6" fill="white"></circle>
  <circle cx="100" cy="125" r="6" fill="white"></circle>

  <line x1="70" y1="85" x2="130" y2="85" stroke="white" stroke-width="4" stroke-linecap="round"></line>
